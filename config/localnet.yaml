# LocalNet / sandbox configuration for gold-custody
# Party hints (allocated at bootstrap) and ledger endpoints.

parties:
  systemOperator: SystemOperator
  custodian: Custodian
  regulator: Regulator
  fundManager: FundManager
  registrar: Registrar
  investor1: Investor1
  investor2: Investor2
  oracleOperator1: OracleOp1
  oracleOperator2: OracleOp2
  navAgent: NavAgent
  weighmaster: Weighmaster
  weighDevice: WeighDevice
  assayer: Assayer
  transporter: Transporter
  auditor: Auditor
  complianceProvider: ComplianceProvider
  vaultKeeper: VaultKeeper
  cashIssuer: CashIssuer

ledger:
  jsonApiUrl: http://localhost:7575
  grpcHost: localhost
  grpcPort: 6865
  cnQuickstartPath: ../cn-quickstart
  # mock (default): every connector uses the in-memory MockLedgerClient, for
  # local/unit convenience. live: connectors require JsonLedgerClient against
  # jsonApiUrl (see connector/shared/src/ledgerClient.ts). Overridable via the
  # LEDGER_MODE env var.
  mode: mock

business:
  minPurity: "0.995"
  attestationMaxAgeSeconds: 86400
  assayValiditySeconds: 2592000
  navValiditySeconds: 3600
  escrowDefaultExpirySeconds: 86400
  maxOracleDivergenceBps: 50
  proofOfReserveMaxAgeSeconds: 604800
  gramsPerUnit: "1.0"
  weightMatchToleranceGrams: "0.01"
  inKindRedemptionThresholdGrams: "1000.0"
  defaultTransferLimit: "100000.0"
  defaultFeeBps: 10
  navPublishIntervalSeconds: 60

connectors:
  navPublisher:
    port: 8101
    host: 127.0.0.1
    xauSources:
      - type: fixture
        name: fixture-primary
        value: "2650.00"
      - type: jsonFile
        name: file-secondary
        path: ./connector/nav-publisher/fixtures/xau.json
  attestationService:
    port: 8102
    host: 127.0.0.1
    evidenceStore: ./evidence-store
    # Required X-API-Key header value for every request but /healthz.
    # Local-dev-only default; rotate/replace before any non-local use.
    apiKey: local-dev-key
    # How long a lone Weight attestation half is kept awaiting its co-signature.
    weightCosignTtlSeconds: 3600
  iso20022:
    inboxDir: ./connector/iso20022-adapter/inbox
    outboxDir: ./connector/iso20022-adapter/outbox
